<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AssistKingOnline — My Requests</title>
  <link rel="stylesheet" href="styles.css?v=39">
</head>
<body>
  <section class="requests-hero">

    <div class="login-button">
      <div id="authArea">
        <span id="welcomeUser" class="welcome-user"></span>
        <button id="openAuth" class="auth-main-btn">Log In / Sign Up</button>
      </div>
    </div>

    <a class="requests-back requests-back-floating" href="index.html">← Back to Home</a>

    <div class="container">
      <div class="requests-hero-content">
        <div class="requests-brand">AssistKingOnline</div>
        <h1 class="requests-title">🧾 My Requests</h1>
        <p>Review the service requests you've submitted.</p>
      </div>
    </div>
  </section>

  <main class="container requests-wrap">
    <div class="requests-card">
      <strong>Your submitted requests</strong>
      <p style="margin:8px 0 14px">This page updates live as your request status changes.</p>

      <div id="requestsList" class="requests-list">
        <div class="request-item">
          <p style="margin:0;font-weight:800;">Loading your requests...</p>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="auth.js?v=18"></script>
  <script type="module">
    import { getApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      query,
      where,
      getDoc,
      updateDoc,
      addDoc,
      doc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = getApp();
    const db = getFirestore(app);

    const requestsList = document.getElementById("requestsList");

    let myRequests = [];
    let myRequestActivity = [];
    let unsubscribeRequestsListener = null;
    let unsubscribeRequestActivityListener = null;

    function waitForAKOAuth() {
      return new Promise((resolve) => {
        if (window.AKOReady) {
          resolve(window.AKOUser);
          return;
        }
        document.addEventListener("ako-auth-ready", (e) => {
          resolve(e.detail.user);
        }, { once: true });
      });
    }

    function normalizeCategory(value) {
      const raw = String(value || "").trim().toLowerCase().replace(/[_\s]+/g, "-");
      if (!raw) return "";
      if (raw === "trucking") return "trucking";
      if (raw === "plumbing") return "plumbing";
      if (raw === "electricians" || raw === "electrician" || raw === "electric" || raw === "electrical") return "electricians";
      if (raw === "carpentry" || raw === "carpenter") return "carpentry";
      if (raw === "auto" || raw === "auto-services" || raw === "automotive") return "auto";
      if (raw === "hvac") return "hvac";
      if (raw === "financial-help" || raw === "financial" || raw === "finance") return "financial-help";
      if (raw === "lawn-care" || raw === "lawn" || raw === "landscaping") return "lawn-care";
      if (raw === "food" || raw === "food2" || raw === "food-services") return "food";
      return raw;
    }

    function formatDate(value) {
      if (!value) return "—";
      try { return new Date(value).toLocaleString(); } catch { return "—"; }
    }

    function escapeHtml(value) {
      return String(value || "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");
    }

    function renderEmpty(message) {
      requestsList.innerHTML = `<div class="request-item"><p style="margin:0;font-weight:800;">${escapeHtml(message)}</p></div>`;
    }

    async function createContractorNotification({ contractorUid, contractorRecordId="", category="", title, message, type="general", actorUid="", actorName="Customer" }) {
      const safeContractorUid = String(contractorUid || "").trim();
      if (!safeContractorUid || !title || !message) return;
      await addDoc(collection(db, "contractorNotifications"), {
        contractorUid: safeContractorUid,
        contractorRecordId: String(contractorRecordId || "").trim(),
        category: normalizeCategory(category || ""),
        title: String(title).trim(),
        message: String(message).trim(),
        type: String(type || "general").trim(),
        actorUid: String(actorUid || "").trim(),
        actorName: String(actorName || "Customer").trim(),
        isRead: false,
        createdAt: Date.now()
      });
    }

    function getActivitiesForRequest(item) {
      return myRequestActivity
        .filter(activity => activity.requestId === item._docId)
        .sort((a, b) => Number(b.createdAt || 0) - Number(a.createdAt || 0));
    }

    function getActivityText(activity) {
      const contractorName = activity.contractorCompanyName || activity.contractorContactName || "contractor";
      switch (String(activity.actionType || "").toLowerCase()) {
        case "assigned": return `Lead assigned to ${contractorName}`;
        case "reassigned": return `Lead reassigned to ${contractorName}`;
        case "accepted": return "Contractor accepted lead";
        case "declined": return "Contractor declined lead";
        case "status-updated": return `Status changed from ${activity.previousStatus || "—"} to ${activity.nextStatus || "—"}`;
        default: return activity.message || "Activity recorded";
      }
    }

    function getLatestActivityForRequest(item) {
      const activities = getActivitiesForRequest(item);
      return activities.length ? activities[0] : null;
    }

    function getAssignedContractorLabel(item) {
      const companyOrName = item.assignedContractorCompanyName || item.assignedContractorContactName || "";
      const categoryLabel = String(item.assignedContractorCategory || "").trim();
      if (!companyOrName) return "";
      if (!categoryLabel) return companyOrName;
      return `${companyOrName} (${categoryLabel})`;
    }

    function renderRequests(items) {
      if (!items.length) { renderEmpty("You have not submitted any requests yet."); return; }

      requestsList.innerHTML = items.map(item => {
        const rawStatus = String(item.status || "new").toLowerCase();
        const statusClass = rawStatus.replace(/\s+/g, "-");
        const canCancel = rawStatus !== "cancelled" && rawStatus !== "closed";
        const latestActivity = getLatestActivityForRequest(item);
        const assignedContractor = getAssignedContractorLabel(item);

        return `
          <div class="request-item">
            <div class="request-item-top">
              <div>
                <h3 class="request-item-title">${escapeHtml(item.serviceType || "Service Request")}</h3>
                <p class="request-item-subtitle">${escapeHtml(item.categoryLabel || item.category || "")}</p>
              </div>
              <span class="request-status-pill status-${escapeHtml(statusClass)}">${escapeHtml(item.status || "new")}</span>
            </div>
            <div class="request-meta">
              <span>📍 ${escapeHtml(item.city || "—")}</span>
              <span>⏱ ${escapeHtml(item.urgency || "—")}</span>
              <span>🗓 ${escapeHtml(formatDate(item.createdAt))}</span>
            </div>
            ${latestActivity
              ? `<div class="request-latest-activity"><span>🕒 Latest activity:</span><strong>${escapeHtml(getActivityText(latestActivity))}</strong><span class="request-latest-activity-time">${escapeHtml(formatDate(latestActivity.createdAt))}</span></div>`
              : `<div class="request-latest-activity"><span>🕒 Latest activity:</span><strong>No activity yet</strong></div>`
            }
            <p class="request-desc">${escapeHtml(item.description || "")}</p>
            <div class="request-contact">
              <span>👤 ${escapeHtml(item.name || "—")}</span>
              <span>✉️ ${escapeHtml(item.email || "—")}</span>
              <span>📞 ${escapeHtml(item.phone || "—")}</span>
            </div>
            ${assignedContractor ? `<p class="assignment-note">Assigned contractor: <strong>${escapeHtml(assignedContractor)}</strong></p>` : ""}
            <div class="request-actions">
              ${canCancel ? `<button type="button" class="request-cancel-btn" data-requestid="${escapeHtml(item._docId || "")}" data-servicetype="${escapeHtml(item.serviceType || "this request")}">Cancel Request</button>` : ""}
            </div>
          </div>
        `;
      }).join("");
    }

    function startMyRequestsListener(currentUser) {
      if (unsubscribeRequestsListener) unsubscribeRequestsListener();
      const q = query(collection(db, "serviceRequests"), where("ownerUid", "==", currentUser.uid));
      unsubscribeRequestsListener = onSnapshot(q, (snapshot) => {
        myRequests = snapshot.docs.map(docSnap => ({ _docId: docSnap.id, ...docSnap.data() }))
          .sort((a, b) => Number(b.createdAt || 0) - Number(a.createdAt || 0));
        renderRequests(myRequests);
      }, (err) => { console.error(err); renderEmpty(`Could not load your requests: ${err.message}`); });
    }

    function startMyRequestActivityListener(currentUser) {
      if (unsubscribeRequestActivityListener) unsubscribeRequestActivityListener();
      const q = query(collection(db, "requestActivity"), where("ownerUid", "==", currentUser.uid));
      unsubscribeRequestActivityListener = onSnapshot(q, (snapshot) => {
        myRequestActivity = snapshot.docs.map(docSnap => ({ _docId: docSnap.id, ...docSnap.data() }));
        renderRequests(myRequests);
      }, (err) => { console.error(err); });
    }

    async function loadMyRequests() {
      const currentUser = await waitForAKOAuth();
      if (!currentUser) {
        window.location.href = `index.html?auth=1&return=${encodeURIComponent("my-requests.html")}`;
        return;
      }
      startMyRequestsListener(currentUser);
      startMyRequestActivityListener(currentUser);
    }

    requestsList.addEventListener("click", async (e) => {
      const cancelBtn = e.target.closest(".request-cancel-btn");
      if (!cancelBtn) return;
      const currentUser = await waitForAKOAuth();
      const requestId = cancelBtn.getAttribute("data-requestid");
      const serviceType = cancelBtn.getAttribute("data-servicetype") || "this request";
      if (!requestId) { alert("Could not cancel this request."); return; }
      const requestItem = myRequests.find(item => item._docId === requestId);
      if (!requestItem) { alert("Could not find this request."); return; }
      const currentStatus = String(requestItem.status || "new").toLowerCase();
      if (currentStatus === "cancelled" || currentStatus === "closed") { alert("This request can no longer be cancelled."); return; }
      const confirmed = confirm(`Cancel "${serviceType}"?`);
      if (!confirmed) return;
      const now = Date.now();
      try {
        await updateDoc(doc(db, "serviceRequests", requestId), { status: "cancelled", cancelledAt: now, updatedAt: now });
        const leadRef = doc(db, "contractorLeads", requestId);
        const leadSnap = await getDoc(leadRef);
        const leadData = leadSnap.exists() ? leadSnap.data() : null;
        if (leadSnap.exists()) {
          await updateDoc(leadRef, { leadStatus: "cancelled", customerCancelledAt: now, updatedAt: now });
        }
        try {
          await addDoc(collection(db, "requestActivity"), {
            requestId, ownerUid: requestItem.ownerUid || "",
            contractorUid: requestItem.assignedContractorUid || leadData?.contractorUid || "",
            contractorRecordId: requestItem.assignedContractorRecordId || leadData?.contractorRecordId || "",
            contractorCategory: requestItem.assignedContractorCategory || leadData?.contractorCategory || "",
            actorUid: currentUser?.uid || "", actorName: currentUser?.name || currentUser?.email || "Customer",
            actorRole: "customer", actionType: "status-updated",
            previousStatus: requestItem.status || "new", nextStatus: "cancelled",
            serviceType: requestItem.serviceType || "", category: requestItem.category || "",
            contractorCompanyName: requestItem.assignedContractorCompanyName || leadData?.contractorCompanyName || "",
            contractorContactName: requestItem.assignedContractorContactName || leadData?.contractorContactName || "",
            createdAt: now
          });
        } catch (activityErr) { console.warn("Request activity log write failed:", activityErr); }
        const contractorUid = String(requestItem.assignedContractorUid || leadData?.contractorUid || "").trim();
        if (contractorUid) {
          await createContractorNotification({
            contractorUid,
            contractorRecordId: requestItem.assignedContractorRecordId || leadData?.contractorRecordId || "",
            category: requestItem.assignedContractorCategory || leadData?.contractorCategory || normalizeCategory(requestItem.category || requestItem.categoryLabel || ""),
            title: "Customer cancelled request",
            message: `${requestItem.serviceType || "A request"} in ${requestItem.city || "your area"} was cancelled by the customer.`,
            type: "request-cancelled", actorUid: currentUser?.uid || "",
            actorName: currentUser?.name || currentUser?.email || "Customer"
          });
        }
        alert("Request cancelled.");
      } catch (err) {
        console.error(err);
        alert("Could not cancel request:\nmessage: " + err.message);
      }
    });

    loadMyRequests();
  </script>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode">
    <span class="theme-toggle-icon">☀️</span>
    <span id="toggleLabel">Light Mode</span>
  </button>

  <script>
    (function(){
      const html=document.documentElement, btn=document.getElementById('themeToggle'), label=document.getElementById('toggleLabel'), icon=btn.querySelector('.theme-toggle-icon'), saved=localStorage.getItem('ako-theme')||'dark';
      html.setAttribute('data-theme',saved); label.textContent=saved==='dark'?'Light Mode':'Dark Mode'; icon.textContent=saved==='dark'?'☀️':'🌙';
      btn.addEventListener('click',function(){ const next=html.getAttribute('data-theme')==='dark'?'light':'dark'; html.setAttribute('data-theme',next); localStorage.setItem('ako-theme',next); label.textContent=next==='dark'?'Light Mode':'Dark Mode'; icon.textContent=next==='dark'?'☀️':'🌙'; });
    })();
  </script>

</body>
</html>
