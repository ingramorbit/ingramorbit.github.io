<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AssistKingOnline — Carpentry</title>
  <link rel="stylesheet" href="styles.css?v=5">
</head>
<body>
  <section class="carpentry-hero">

    <div class="login-button">
      <div id="authArea">
        <span id="welcomeUser" class="welcome-user"></span>
        <button id="openAuth" class="auth-main-btn">Log In / Sign Up</button>
      </div>
    </div>

    <a class="carpentry-back carpentry-back-floating" href="index.html">← Back to Home</a>

    <div class="container">
      <div class="carpentry-hero-content">
        <div class="carpentry-brand">AssistKingOnline</div>
        <h1 class="carpentry-title">🪚 Carpentry</h1>
        <p>Custom builds, framing, trim, cabinetry and more.</p>
      </div>
    </div>
  </section>

  <main class="container carpentry-wrap">
    <div class="carpentry-card">
      <strong>Popular requests</strong>
      <div>
        <span class="carpentry-pill">Decks</span>
        <span class="carpentry-pill">Trim/Molding</span>
        <span class="carpentry-pill">Cabinetry</span>
        <span class="carpentry-pill">Framing</span>
      </div>
    </div>

    <div class="carpentry-card">
      <strong>Get matched</strong>
      <p style="margin:8px 0 0">Tell us what you need and we’ll connect you with carpenters.</p>
      <a class="carpentry-cta" href="#">Start carpentry request</a>
    </div>
  </main>

  <script type="module" src="auth.js"></script>
</body>
</html>
