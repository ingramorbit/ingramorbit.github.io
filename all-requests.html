<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AssistKingOnline — All Requests</title>
  <link rel="stylesheet" href="styles.css?v=14">
</head>
<body>
  <section class="all-requests-hero">

    <div class="login-button">
      <div id="authArea">
        <span id="welcomeUser" class="welcome-user"></span>
        <button id="openAuth" class="auth-main-btn">Log In / Sign Up</button>
      </div>
    </div>

    <a class="all-requests-back all-requests-back-floating" href="index.html">← Back to Home</a>

    <div class="container">
      <div class="all-requests-hero-content">
        <div class="all-requests-brand">AssistKingOnline</div>
        <h1 class="all-requests-title">📂 All Requests</h1>
        <p>Admin view of all submitted service requests.</p>
      </div>
    </div>
  </section>

  <main class="container all-requests-wrap">
    <div class="all-requests-card">
      <strong>Submitted requests</strong>
      <p style="margin:8px 0 14px">This page is for admins only.</p>

      <div id="allRequestsList" class="requests-list">
        <div class="request-item">
          <p style="margin:0;font-weight:800;">Loading all requests...</p>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="auth.js?v=16"></script>
  <script type="module">
    import { getApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
  getFirestore,
  collection,
  getDocs,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = getApp();
    const db = getFirestore(app);

    const allRequestsList = document.getElementById("allRequestsList");

    function waitForAKOAuth() {
      return new Promise((resolve) => {
        if (window.AKOReady) {
          resolve(window.AKOUser);
          return;
        }

        document.addEventListener("ako-auth-ready", (e) => {
          resolve(e.detail.user);
        }, { once: true });
      });
    }

    function formatDate(value) {
      if (!value) return "—";
      try {
        return new Date(value).toLocaleString();
      } catch {
        return "—";
      }
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderAccessDenied() {
      allRequestsList.innerHTML = `
        <div class="request-item">
          <p style="margin:0;font-weight:800;">Admin access is required.</p>
        </div>
      `;
    }

    function renderRequests(items) {
      if (!items.length) {
        allRequestsList.innerHTML = `
          <div class="request-item">
            <p style="margin:0;font-weight:800;">No service requests found.</p>
          </div>
        `;
        return;
      }

      allRequestsList.innerHTML = items.map(item => {
  const rawStatus = String(item.status || "new").toLowerCase();
  const statusClass = rawStatus.replace(/\s+/g, "-");

  return `
    <div class="request-item">
      <div class="request-item-top">
        <div>
          <h3 class="request-item-title">${escapeHtml(item.serviceType || "Service Request")}</h3>
          <p class="request-item-subtitle">${escapeHtml(item.categoryLabel || item.category || "")}</p>
        </div>
        <span class="request-status-pill status-${escapeHtml(statusClass)}">
          ${escapeHtml(item.status || "new")}
        </span>
      </div>

      <div class="request-meta">
        <span>📍 ${escapeHtml(item.city || "—")}</span>
        <span>⏱ ${escapeHtml(item.urgency || "—")}</span>
        <span>🗓 ${escapeHtml(formatDate(item.createdAt))}</span>
      </div>

      <p class="request-desc">${escapeHtml(item.description || "")}</p>

      <div class="request-contact">
        <span>👤 ${escapeHtml(item.name || "—")}</span>
        <span>✉️ ${escapeHtml(item.email || "—")}</span>
        <span>📞 ${escapeHtml(item.phone || "—")}</span>
      </div>

      <div class="admin-request-actions">
        <select class="request-status-select" data-requestid="${escapeHtml(item._docId || "")}">
          <option value="new" ${rawStatus === "new" ? "selected" : ""}>new</option>
          <option value="matched" ${rawStatus === "matched" ? "selected" : ""}>matched</option>
          <option value="in-progress" ${rawStatus === "in-progress" ? "selected" : ""}>in-progress</option>
          <option value="closed" ${rawStatus === "closed" ? "selected" : ""}>closed</option>
          <option value="cancelled" ${rawStatus === "cancelled" ? "selected" : ""}>cancelled</option>
        </select>

        <button
          type="button"
          class="request-update-btn"
          data-requestid="${escapeHtml(item._docId || "")}"
          data-servicetype="${escapeHtml(item.serviceType || "this request")}"
        >
          Update Status
        </button>
      </div>
    </div>
  `;
}).join("");
    }

    async function loadAllRequests() {
      const currentUser = await waitForAKOAuth();

      if (!currentUser) {
        window.location.href = `index.html?auth=1&return=${encodeURIComponent("all-requests.html")}`;
        return;
      }

      if (currentUser.tier !== "admin") {
        renderAccessDenied();
        return;
      }

      try {
        const snapshot = await getDocs(collection(db, "serviceRequests"));

        const items = snapshot.docs
          .map(doc => ({
            _docId: doc.id,
            ...doc.data()
          }))
          .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

        renderRequests(items);
      } catch (err) {
        console.error(err);
        allRequestsList.innerHTML = `
          <div class="request-item">
            <p style="margin:0;font-weight:800;">Could not load requests: ${escapeHtml(err.message)}</p>
          </div>
        `;
      }
    }
allRequestsList.addEventListener("click", async (e) => {
  const updateBtn = e.target.closest(".request-update-btn");
  if (!updateBtn) return;

  const requestId = updateBtn.getAttribute("data-requestid");
  const serviceType = updateBtn.getAttribute("data-servicetype") || "this request";

  if (!requestId) {
    alert("Could not update this request.");
    return;
  }

  const select = allRequestsList.querySelector(`.request-status-select[data-requestid="${CSS.escape(requestId)}"]`);
  if (!select) {
    alert("Could not find the status selector.");
    return;
  }

  const nextStatus = (select.value || "").trim();
  if (!nextStatus) {
    alert("Select a status first.");
    return;
  }

  const confirmed = confirm(`Update "${serviceType}" to "${nextStatus}"?`);
  if (!confirmed) return;

  const updatePayload = {
    status: nextStatus,
    updatedAt: Date.now()
  };

  if (nextStatus === "closed") {
    updatePayload.closedAt = Date.now();
  }

  if (nextStatus === "cancelled") {
    updatePayload.cancelledAt = Date.now();
  }

  try {
    await updateDoc(doc(db, "serviceRequests", requestId), updatePayload);
    await loadAllRequests();
    alert("Status updated.");
  } catch (err) {
    console.error(err);
    alert(
      "Could not update status:\n" +
      "message: " + err.message
    );
  }
});
    loadAllRequests();
  </script>
</body>
</html>
