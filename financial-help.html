<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AssistKingOnline — Financial Help</title>
  <link rel="stylesheet" href="styles.css?v=11">
</head>
<body>
  <section class="financial-hero">

    <div class="login-button">
      <div id="authArea">
        <span id="welcomeUser" class="welcome-user"></span>
        <button id="openAuth" class="auth-main-btn">Log In / Sign Up</button>
      </div>
    </div>

    <a class="financial-back financial-back-floating" href="index.html">← Back to Home</a>

    <div class="container">
      <div class="financial-hero-content">
        <div class="financial-brand">AssistKingOnline</div>
        <h1 class="financial-title">💳 Financial Help</h1>
        <p>Bookkeepers, tax prep, and business financial services.</p>
      </div>
    </div>
  </section>

  <main class="container financial-wrap">
    <div class="financial-card">
      <strong>Popular requests</strong>
      <div>
        <span class="financial-pill">Bookkeeping</span>
        <span class="financial-pill">Tax prep</span>
        <span class="financial-pill">Payroll</span>
        <span class="financial-pill">Invoicing</span>
      </div>
    </div>

    <div class="financial-card">
      <strong>Get matched</strong>
      <p style="margin:8px 0 0">Tell us your needs and business size.</p>
      <a class="financial-cta" href="#">Start financial request</a>
    </div>
  </main>

  <script type="module" src="auth.js"></script>
</body>
</html>
