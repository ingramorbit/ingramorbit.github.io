<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AssistKingOnline — Contact Us</title>
  <link rel="stylesheet" href="styles.css?v=33">
</head>
<body>
  <section class="trucking-hero">

    <div class="login-button">
      <div id="authArea">
        <span id="welcomeUser" class="welcome-user"></span>
        <button id="openAuth" class="auth-main-btn">Log In / Sign Up</button>
      </div>
    </div>

    <a class="trucking-back trucking-back-floating" href="index.html">← Back to Home</a>

    <div class="container">
      <div class="trucking-hero-content">
        <div class="trucking-brand">AssistKingOnline</div>
        <h1 class="trucking-title">📩 Contact Us</h1>
        <p>We’re here to help. Send us a message anytime.</p>
      </div>
    </div>
  </section>

  <main class="container trucking-wrap">
    <div class="trucking-card">
      <strong>Send us a message</strong>
      <p style="margin:8px 0 14px">
        Fill out the form below and we’ll get back to you as soon as possible.
      </p>

      <form
        action="https://formspree.io/f/mayzpovd"
        method="POST"
        class="post-load-form"
      >
        <input type="text" name="name" placeholder="Your Name" required />
        <input type="email" name="email" placeholder="Your Email" required />
        <textarea
          name="message"
          rows="6"
          placeholder="Message"
          required
          style="width:100%;padding:12px;border-radius:12px;border:1px solid #d7d7d7;font:inherit;resize:vertical;"
        ></textarea>

        <input type="hidden" name="_subject" value="AssistKingOnline Contact Request">
        <input type="hidden" name="_cc" value="help@assistkingonline.com">

        <button type="submit" class="trucking-cta">Send Message</button>
      </form>
    </div>

    <div class="trucking-card">
      <strong>Other ways to reach us</strong>
      <p style="margin:8px 0 10px;">
        Email:
        <a href="mailto:help@assistkingonline.com">help@assistkingonline.com</a>
      </p>
      <p style="margin:0;">
        Need general help first? Visit the <a href="help.html">Help page</a>.
      </p>
    </div>
  </main>

  <script type="module" src="auth.js?v=16"></script>
</body>
</html>
